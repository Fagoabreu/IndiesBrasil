name: Renew SSL Certificate

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  renew-ssl:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ vars.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Renew SSL on VPS
        run: |
          ssh "${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}" << 'EOF'
            set -e

            cd /var/www/indies

            echo "Checking .env.production"
            test -f .env.production || {
              echo "❌ .env.production NOT FOUND"
              exit 1
            }

            set -a
            . ./.env.production
            set +a

            if [ -z "$CERTBOT_DOMAIN" ]; then
              echo "❌ CERTBOT_DOMAIN is empty in .env.production"
              exit 1
            fi

            if [ -z "$CERTBOT_EMAIL" ]; then
              echo "❌ CERTBOT_EMAIL is empty in .env.production"
              exit 1
            fi

            CERTBOT_DOMAINS_CSV=$(echo "$CERTBOT_DOMAIN" | tr -d '[:space:]')
            PRIMARY_DOMAIN="${CERTBOT_DOMAINS_CSV%%,*}"

            if [ -z "$PRIMARY_DOMAIN" ]; then
              echo "❌ Invalid CERTBOT_DOMAIN value: '$CERTBOT_DOMAIN'"
              exit 1
            fi

            docker compose up -d nginx

            echo "Requesting/renewing certificate if needed"
            echo "Certbot cert-name: $PRIMARY_DOMAIN"
            echo "Certbot domains: $CERTBOT_DOMAINS_CSV"
            docker compose run --rm certbot certonly \
              --webroot \
              --webroot-path=/var/www/certbot \
              --non-interactive \
              --agree-tos \
              --no-eff-email \
              --keep-until-expiring \
              --expand \
              --renew-with-new-domains \
              --cert-name "$PRIMARY_DOMAIN" \
              --email "$CERTBOT_EMAIL" \
              -d "$CERTBOT_DOMAINS_CSV"

            CERT_PATH="/var/lib/docker/volumes/indies_nginx_secrets/_data/live/$PRIMARY_DOMAIN/fullchain.pem"
            test -f "$CERT_PATH" || {
              echo "❌ fullchain.pem not found at $CERT_PATH"
              exit 1
            }

            openssl x509 -in "$CERT_PATH" -noout -subject -issuer -dates -ext subjectAltName

            echo "Reloading nginx"
            docker exec nginx nginx -s reload
          EOF
