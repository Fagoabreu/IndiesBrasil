name: Deploy Infra (Manual)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to confirm infra deployment"
        required: true

jobs:
  deploy-infra:
    if: github.event.inputs.confirm == 'DEPLOY'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Setup SSH
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ vars.SSH_HOST }}" >> ~/.ssh/known_hosts

      # 🚀 Apply infra
      - name: Apply infra
        run: |
          ssh "${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}" << 'EOF'
            set -e

            cd /var/www/indies

            echo "🔍 Checking .env.production"
            test -f .env.production || {
              echo "❌ .env.production NOT FOUND"
              exit 1
            }

            set -a
            . ./.env.production
            set +a

            if [ -z "$CERTBOT_DOMAIN" ]; then
              echo "❌ CERTBOT_DOMAIN is empty in .env.production"
              exit 1
            fi

            if [ -z "$CERTBOT_EMAIL" ]; then
              echo "❌ CERTBOT_EMAIL is empty in .env.production"
              exit 1
            fi

            CERTS_DIR="/var/lib/docker/volumes/indies_postgres-certs/_data"

            echo "🔍 Checking Postgres certificates"
            test -f "$CERTS_DIR/server.crt" || {
              echo "❌ server.crt NOT FOUND in $CERTS_DIR"
              ls -l "$CERTS_DIR" || true
              exit 1
            }

            LE_LIVE_DIR="/var/lib/docker/volumes/indies_nginx_secrets/_data/live/$CERTBOT_DOMAIN"
            mkdir -p "$LE_LIVE_DIR"

            if [ ! -f "$LE_LIVE_DIR/fullchain.pem" ] || [ ! -f "$LE_LIVE_DIR/privkey.pem" ]; then
              echo "🧩 Creating temporary self-signed certificate for nginx bootstrap"
              openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
                -keyout "$LE_LIVE_DIR/privkey.pem" \
                -out "$LE_LIVE_DIR/fullchain.pem" \
                -subj "/CN=$CERTBOT_DOMAIN"
            fi

            echo "🚀 Deploying infra"
            docker compose pull postgres nginx certbot
            docker compose up -d postgres nginx

            echo "📜 Requesting or renewing public TLS certificate"
            docker compose run --rm certbot certonly \
              --webroot \
              --webroot-path=/var/www/certbot \
              --non-interactive \
              --agree-tos \
              --no-eff-email \
              --keep-until-expiring \
              --email "$CERTBOT_EMAIL" \
              -d "$CERTBOT_DOMAIN"

            echo "🔄 Reloading nginx with the latest certificates"
            docker exec nginx nginx -s reload
          EOF
