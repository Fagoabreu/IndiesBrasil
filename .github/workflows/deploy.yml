name: Deploy Indies Brasil

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required production vars
        run: |
          set -e
          missing=0

          if [ -z "${{ vars.CERTBOT_DOMAIN }}" ]; then
            echo "::error::Missing repository/environment variable CERTBOT_DOMAIN"
            missing=1
          fi

          if [ -z "${{ vars.CERTBOT_EMAIL }}" ]; then
            echo "::error::Missing repository/environment variable CERTBOT_EMAIL"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      # 1️⃣ Build da imagem
      - name: Build image
        run: |
          docker build -t indies-app:latest .

      # 2️⃣ Exportar imagem
      - name: Export image
        run: docker save indies-app:latest | gzip > indies-app.tar.gz

      # 3️⃣ Gerar .env.production (APP)
      - name: Generate app env
        run: |
          {

            echo "NODE_ENV=production"
            echo "CERTBOT_ENV=production"
            echo "CERTBOT_DOMAIN=${{ vars.CERTBOT_DOMAIN }}"
            echo "CERTBOT_EMAIL=${{ vars.CERTBOT_EMAIL }}"
            echo "NEXT_PUBLIC_SITE_NAME=${{ vars.NEXT_PUBLIC_SITE_NAME }}"
            echo "NEXT_PUBLIC_BASE_URL=${{ vars.NEXT_PUBLIC_BASE_URL }}"
            echo "PEPPER=${{ secrets.PEPPER }}"
            echo "POSTGRES_HOST=${{ vars.POSTGRES_HOST }}"
            echo "POSTGRES_PORT=${{ vars.POSTGRES_PORT }}"
            echo "POSTGRES_DB=${{ vars.POSTGRES_DB }}"
            echo "POSTGRES_USER=${{ vars.POSTGRES_USER }}"
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
            echo "POSTGRES_CA_PATH=${{ vars.POSTGRES_CA_PATH }}"
            echo "EMAIL_SMTP_HOST=${{ vars.EMAIL_SMTP_HOST }}"
            echo "EMAIL_SMTP_PORT=${{ vars.EMAIL_SMTP_PORT }}"
            echo "EMAIL_SMTP_USER=${{ vars.EMAIL_SMTP_USER }}"
            echo "EMAIL_SMTP_PASSWORD=${{ secrets.EMAIL_SMTP_PASSWORD }}"
            echo "CLOUDINARY_CLOUD_NAME=${{ vars.CLOUDINARY_CLOUD_NAME }}"
            echo "CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}"
            echo "CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}"
            echo "FILE_UPLOAD_BASE_FOLDER=${{ vars.FILE_UPLOAD_BASE_FOLDER }}"
            echo "TWITCH_CLIENT_ID=${{ secrets.TWITCH_CLIENT_ID }}"
            echo "TWITCH_CLIENT_SECRET=${{ secrets.TWITCH_CLIENT_SECRET }}"
            echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}"
          } > .env.production

      # 4️⃣ Configurar SSH
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      # SSH options comuns para evitar timeouts intermitentes
      # ConnectTimeout=30: falha rápido em vez de esperar 2min
      # ServerAliveInterval=15: mantém conexão viva durante transfers longos
      # TCPKeepAlive=yes: detecta conexões mortas
      # Retry com exponential backoff resolve o problema intermitente de timeout
      - name: Prepare directories on server
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=15 -o TCPKeepAlive=yes"
          SSH_TARGET="${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}"

          for i in 1 2 3 4 5; do
            echo "Attempt $i/5..."
            if ssh -T $SSH_OPTS "$SSH_TARGET" "mkdir -p /var/www/indies/nginx /var/www/indies/certs"; then
              echo "✅ Directories prepared"
              exit 0
            fi
            wait=$((2 ** i))
            echo "⏳ Failed, retrying in ${wait}s..."
            sleep $wait
          done
          echo "❌ Failed after 5 attempts"
          exit 1

      #Enviar arquivos
      - name: Upload app artifacts
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=15 -o TCPKeepAlive=yes"
          SSH_TARGET="${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}"

          for i in 1 2 3 4 5; do
            echo "Attempt $i/5..."
            if rsync -az --checksum \
              --exclude='certs/' \
              -e "ssh $SSH_OPTS" \
              indies-app.tar.gz \
              .env.production \
              deploy/compose.yaml \
              "$SSH_TARGET:/var/www/indies/" && \
              rsync -az --checksum \
              -e "ssh $SSH_OPTS" \
              deploy/nginx/ \
              "$SSH_TARGET:/var/www/indies/nginx"; then
              echo "✅ Artifacts uploaded"
              exit 0
            fi
            wait=$((2 ** i))
            echo "⏳ Failed, retrying in ${wait}s..."
            sleep $wait
          done
          echo "❌ Failed after 5 attempts"
          exit 1

      # 5️⃣ Deploy remoto
      - name: Deploy app
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=15 -o TCPKeepAlive=yes"
          SSH_TARGET="${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}"

          for i in 1 2 3 4 5; do
            echo "Attempt $i/5..."
            if ssh $SSH_OPTS "$SSH_TARGET" << 'EOF'
            set -e
            cd /var/www/indies

            echo "🔍 Checking .env.production"
            test -f .env.production || {
              echo "❌ .env.production NOT FOUND"
              exit 1
            }

            echo "📦 Ensuring indies_postgres-certs volume exists"
            docker volume inspect indies_postgres-certs >/dev/null 2>&1 || docker volume create indies_postgres-certs
            CERTS_DIR="/var/lib/docker/volumes/indies_postgres-certs/_data"
            echo "📁 CERTS_DIR=$CERTS_DIR"

            mkdir -p "$CERTS_DIR"

            if [ ! -f "$CERTS_DIR/root.key" ]; then
              echo "🧾 Generating root CA"
              openssl genrsa -out "$CERTS_DIR/root.key" 4096
              openssl req -x509 -new -nodes \
                -key "$CERTS_DIR/root.key" \
                -sha256 -days 3650 \
                -subj "/CN=Postgres Root CA" \
                -out "$CERTS_DIR/root.crt"
            fi

            if [ ! -f "$CERTS_DIR/server.key" ]; then
              echo "🔑 Generating server key"
              openssl genrsa -out "$CERTS_DIR/server.key" 4096
            fi

            if [ ! -f "$CERTS_DIR/server.csr" ]; then
              echo "📄 Generating server CSR"
              openssl req -new \
                -key "$CERTS_DIR/server.key" \
                -subj "/CN=postgres" \
                -out "$CERTS_DIR/server.csr"
            fi

            if [ ! -f "$CERTS_DIR/server.crt" ]; then
              echo "📜 Signing server certificate"
              openssl x509 -req \
                -in "$CERTS_DIR/server.csr" \
                -CA "$CERTS_DIR/root.crt" \
                -CAkey "$CERTS_DIR/root.key" \
                -CAcreateserial \
                -out "$CERTS_DIR/server.crt" \
                -days 3650 -sha256
            fi

            echo "🔒 Fixing permissions"
            chown -R 70:70 "$CERTS_DIR"
            chmod 755 "$CERTS_DIR"
            chmod 600 "$CERTS_DIR/server.key"
            chmod 644 "$CERTS_DIR/server.crt" "$CERTS_DIR/root.crt"

            echo "✅ Postgres SSL certificates ready"

            echo "🔍 Checking nginx config files"
            test -f nginx/indies.http.conf || {
              echo "❌ indies.http.conf NOT FOUND"
              exit 1
            }

            test -f nginx/indies.https.conf || {
              echo "❌ indies.https.conf NOT FOUND"
              exit 1
            }

            docker load < indies-app.tar.gz
            docker compose -f compose.yaml up -d --no-deps indies-app

            echo "🔄 Reloading nginx"
            if docker ps -a --format '{{.Names}}' | grep -q '^nginx$'; then
              echo "⏳ Waiting for nginx to be running..."

              for i in {1..15}; do
                STATUS=$(docker inspect -f '{{.State.Status}}' nginx 2>/dev/null || true)

                if [ "$STATUS" = "running" ]; then
                  docker exec nginx nginx -s reload
                  echo "✅ nginx reloaded"
                  break
                fi

                echo "⏳ nginx status: $STATUS (retry $i)"
                sleep 2
              done
            else
              echo "ℹ️ nginx container not found, skipping reload"
            fi
          EOF
            then
              echo "✅ Deploy completed"
              exit 0
            fi
            wait=$((2 ** i))
            echo "⏳ Deploy failed, retrying in ${wait}s..."
            sleep $wait
          done
          echo "❌ Deploy failed after 5 attempts"
          exit 1

      # Run Migrations
      #- name: Run database migrations
      #  run: |
      #    ssh -o StrictHostKeyChecking=no ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} <<EOF
      #    cd /var/www/indies
      #    docker exec indies-app npx node-pg-migrate -m infra/migrations up
      #    EOF
